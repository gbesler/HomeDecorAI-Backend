openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HomeDecorAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: design
    description: AI design generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /design/interior:
    post:
      operationId: createInteriorDesign
      tags: [design]
      summary: Generate an interior design transformation
      description: Accepts a room photo URL, room type, and design style. Returns AI-generated redesigned image.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteriorDesignRequest"
      responses:
        "200":
          description: Successfully generated interior design
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteriorDesignResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - invalid client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RoomType:
      type: string
      enum:
        - livingRoom
        - bedroom
        - kitchen
        - underStairSpace
        - diningRoom
        - bathroom
        - entryway
        - stairway
        - office
        - homeOffice
        - studyRoom
        - gamingRoom
    DesignStyle:
      type: string
      enum:
        - modern
        - minimalist
        - scandinavian
        - industrial
        - bohemian
        - contemporary
        - midCentury
        - coastal
        - farmhouse
        - japandi
        - artDeco
        - traditional
        - tropical
        - rustic
        - luxury
        - cozy
        - christmas
        - airbnb
    InteriorDesignRequest:
      type: object
      required:
        - imageUrl
        - roomType
        - designStyle
      properties:
        imageUrl:
          type: string
          format: uri
          description: Public URL of the room photo to redesign
        roomType:
          $ref: "#/components/schemas/RoomType"
        designStyle:
          $ref: "#/components/schemas/DesignStyle"
    InteriorDesignResponse:
      type: object
      required:
        - id
        - outputImageUrl
        - provider
        - durationMs
      properties:
        id:
          type: string
          description: Generation record ID
        outputImageUrl:
          type: string
          format: uri
          description: URL of the generated design image (stored in S3)
        provider:
          type: string
          description: AI provider used (replicate or falai)
        durationMs:
          type: integer
          description: Generation duration in milliseconds
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        retryAfter:
          type: integer
          description: Seconds until rate limit resets (only for 429)
